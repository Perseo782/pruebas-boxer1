<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Revision final</title>
  <link rel="stylesheet" href="../styles/app_brand_tokens.css">
  <style>
    @font-face {
      font-family: "Graphik";
      src: url("../../assets/fonts/Graphik-Regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "Graphik";
      src: url("../../assets/fonts/Graphik-Medium.ttf") format("truetype");
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "Graphik";
      src: url("../../assets/fonts/Graphik-Bold.ttf") format("truetype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    :root {
      --font-family-operativa: "Graphik", Arial, sans-serif;
      --panel: var(--bg-surface);
      --text: var(--text-primary);
      --muted: var(--text-secondary);
      --line: var(--border-soft);
      --ok: var(--action-primary);
      --warn: var(--info);
      --danger: var(--danger);
      --primary: var(--action-primary);
      --primary2: var(--action-primary-alt);
      --soft: var(--bg-surface-soft);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 22px;
      font-family: var(--font-family-operativa);
      color: var(--text);
      background:
        radial-gradient(circle at 90% -25%, rgba(79, 151, 142, 0.12), rgba(79, 151, 142, 0) 40%),
        linear-gradient(180deg, var(--bg-app), var(--bg-surface-soft));
    }
    .wrap { max-width: 1240px; margin: 0 auto; display: grid; gap: 16px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      box-shadow: var(--shadow-soft);
    }
    h1 { margin: 0 0 6px; font-size: 30px; color: var(--text-brand-large); }
    p { margin: 0; color: var(--muted); }
    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 16px;
    }
    @media (max-width: 1050px) {
      .layout { grid-template-columns: 1fr; }
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-weight: 700;
      margin-top: 10px;
    }
    .badge.ok { color: var(--action-primary); background: var(--action-soft-2); border-color: var(--action-soft-2); }
    .badge.warn { color: var(--info); background: var(--support-blue-soft); border-color: var(--support-blue-soft); }
    .badge.danger { color: var(--danger); background: var(--danger-fill); border-color: var(--danger-soft); }
    .muted { color: var(--muted); font-size: 13px; }
    .queue-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .queue-actions button,
    .actions button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .primary { color: var(--text-on-dark); background: var(--primary); }
    .danger { color: var(--text-on-dark); background: var(--danger); }
    .ghost { background: var(--bg-surface); color: var(--text); border: 1px solid var(--border-medium); }
    .empty { color: var(--muted); margin: 0; }
    .count {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
    }
    .pending-list {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--bg-surface-soft);
      max-height: 500px;
      overflow: auto;
    }
    .pending-card {
      border-bottom: 1px solid var(--line);
      padding: 10px;
      display: grid;
      gap: 8px;
    }
    .pending-card:last-child { border-bottom: 0; }
    .pending-body {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 10px;
      align-items: center;
    }
    .pending-main {
      min-width: 0;
    }
    .pending-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pending-thumb {
      width: 88px;
      height: 88px;
      border-radius: 10px;
      object-fit: cover;
      display: block;
      border: 1px solid var(--line);
      background: var(--support-blue-soft);
    }
    .pending-thumb-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--muted);
    }
    .pending-title { font-weight: 700; }
    .pending-meta { font-size: 12px; color: var(--muted); }
    .pending-open {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 10px;
      background: var(--bg-surface);
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
    }
    .form-grid {
      margin-top: 14px;
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr 1fr;
    }
    .form-grid .full { grid-column: 1 / -1; }
    @media (max-width: 780px) {
      .form-grid { grid-template-columns: 1fr; }
    }
    label { font-size: 13px; font-weight: 700; display: block; margin-bottom: 5px; }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      background: var(--bg-surface);
      color: var(--text);
    }
    input[readonly] { background: var(--bg-surface-soft); color: var(--muted); }
    .alergen-grid {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: var(--bg-surface);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    @media (max-width: 780px) {
      .alergen-grid { grid-template-columns: 1fr; }
    }
    .alg-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    .photos {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--bg-surface);
      padding: 10px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      min-height: 72px;
    }
    .photo-btn {
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      width: 108px;
      height: 108px;
      padding: 0;
      background: var(--bg-surface-soft);
      cursor: pointer;
    }
    .photo-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .actions {
      margin-top: 14px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    pre {
      margin: 0;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--bg-surface-soft);
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 120px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
    }
    .viewer-modal {
      position: fixed;
      inset: 0;
      background: var(--overlay-strong);
      display: none;
      z-index: 1000;
      padding: 18px;
    }
    .viewer-modal.open { display: block; }
    .viewer-card {
      width: 100%;
      height: 100%;
      margin: 0 auto;
      background: transparent;
      border-radius: 0;
      border: 0;
      padding: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
    }
    .viewer-head {
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }
    #viewer-close {
      width: 44px;
      height: 44px;
      min-height: 44px;
      border-radius: 999px;
      padding: 0;
      font-size: 26px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .viewer-stage {
      background: transparent;
      border: 0;
      border-radius: 0;
      overflow: hidden;
      position: relative;
      touch-action: none;
      cursor: grab;
    }
    .viewer-stage.dragging { cursor: grabbing; }
    .viewer-image {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: center center;
      max-width: min(92vw, 980px);
      max-height: calc(100vh - 92px);
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
        <h1>Revision final</h1>
      <p>Siempre terminas aquí: revisas, corriges y decides guardar o cancelar.</p>
    </section>

    <div class="layout">
      <section class="panel">
        <h2 style="margin:0;font-size:21px;">Pendientes</h2>
        <div id="pendientes-count" class="count"></div>
        <div class="queue-actions">
          <button id="recargar-pendientes" class="ghost">Recargar</button>
          <button id="cancelar-global" class="ghost">Salir de revisión</button>
        </div>
        <div id="pendientes-table" class="pending-list"></div>
      </section>

      <section class="panel">
        <h2 style="margin:0;font-size:21px;">Edición del caso</h2>
        <div id="pasaporte-badge" class="badge"></div>
        <div id="pasaporte-msg" class="muted"></div>

        <div class="form-grid">
          <div class="full">
            <label for="draft-id">DraftId</label>
            <input id="draft-id" type="text" readonly>
          </div>
          <div>
            <label for="nombre-final">Nombre final</label>
            <input id="nombre-final" type="text" placeholder="Nombre del producto">
          </div>
          <div>
            <label for="formato-final">Formato final</label>
            <input id="formato-final" type="text" placeholder="Ej: 500 g">
          </div>
          <div class="full">
            <label for="trazas-finales">Trazas (coma)</label>
            <input id="trazas-finales" type="text" placeholder="Ej: gluten, mostaza">
          </div>
          <div class="full">
            <label>Alérgenos (14 oficiales)</label>
            <div id="alergenos-grid" class="alergen-grid"></div>
          </div>
          <div class="full">
            <label>Fotos del caso (toca para ampliar)</label>
            <div id="foto-miniaturas" class="photos"></div>
          </div>
        </div>

        <div class="actions">
          <button id="confirmar" class="primary">Guardar</button>
          <button id="cancelar" class="danger">Cancelar caso</button>
        </div>
      </section>
    </div>

    <section class="panel">
      <h2 style="margin:0 0 8px;font-size:20px;">Salida operativa</h2>
      <pre id="salida-json"></pre>
    </section>
  </div>

  <div id="viewer-modal" class="viewer-modal" aria-hidden="true">
    <div class="viewer-card">
      <div class="viewer-head">
        <button id="viewer-close" class="danger" aria-label="Cerrar foto">&times;</button>
      </div>
      <div id="viewer-stage" class="viewer-stage">
        <img id="viewer-image" class="viewer-image" alt="Foto ampliada">
      </div>
    </div>
  </div>

  <script src="../../shared/alergenos_oficiales.js"></script>
  <script src="../../backend/persistencia/data_store_local.js"></script>
  <script src="../estado/shared_store_browser.js"></script>
  <script src="../../backend/sync/sync_backup.js"></script>
  <script src="../config/firebase_config_fase3.js"></script>
  <script src="../../backend/adaptadores/firestore_productos_remote.js"></script>
  <script type="module" src="../estado/firebase_bootstrap_fase3.js"></script>
  <script src="../../backend/ia/cerebro_productos_repository_resolver.js"></script>
  <script src="../../backend/ia/cerebro_productos_persistencia.js"></script>
  <script src="../estado/analysis_exclusive_runtime.js"></script>
  <script src="../estado/cerebro_visible_runtime.js"></script>
  <script src="../estado/cerebro_warmup.js"></script>
  <script src="../estado/revision_app.js"></script>
</body>
</html>
