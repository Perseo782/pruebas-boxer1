<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Importar Excel</title>
  <link rel="stylesheet" href="../styles/app_brand_tokens.css">
  <style>
    @font-face {
      font-family: "Graphik";
      src: url("../../assets/fonts/Graphik-Regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "Graphik";
      src: url("../../assets/fonts/Graphik-Medium.ttf") format("truetype");
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "Graphik";
      src: url("../../assets/fonts/Graphik-Bold.ttf") format("truetype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    :root {
      --font-family-operativa: "Graphik", Arial, sans-serif;
      --font-size-title: 24px;
      --line-height-title: 30px;
      --font-size-body: 16px;
      --line-height-body: 24px;
      --font-size-secondary: 14px;
      --line-height-secondary: 20px;
      --font-size-small: 12px;
      --line-height-small: 16px;
      --weight-regular: 400;
      --weight-medium: 500;
      --weight-bold: 700;
      --bg: var(--bg-app);
      --panel: var(--bg-surface);
      --text: var(--text-primary);
      --muted: var(--text-secondary);
      --line: var(--border-soft);
      --line-strong: var(--border-medium);
      --primary: var(--action-primary);
      --primary2: var(--action-primary-alt);
      --soft: var(--bg-surface-soft);
      --warn: var(--bg-surface-soft);
      --warnText: var(--text-primary);
      --shadow: var(--shadow-soft);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      color: var(--text);
      font-family: var(--font-family-operativa);
      font-size: var(--font-size-body);
      line-height: var(--line-height-body);
      background:
        radial-gradient(circle at top right, rgba(79, 151, 142, 0.08), rgba(79, 151, 142, 0) 34%),
        linear-gradient(180deg, var(--bg-app) 0%, var(--bg-surface-soft) 100%);
    }
    .wrap { max-width: 980px; margin: 0 auto; display: grid; gap: 16px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: var(--shadow);
    }
    .hero {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 12px;
    }
    button {
      border: 1px solid var(--primary);
      border-radius: 999px;
      padding: 11px 16px;
      font: inherit;
      font-weight: var(--weight-medium);
      cursor: pointer;
      color: var(--text-on-dark);
      background: var(--primary);
    }
    button.secondary {
      color: var(--text);
      background: var(--bg-surface);
      border-color: var(--line-strong);
    }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .meta { color: var(--muted); }
    .warn {
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--warn);
      color: var(--warnText);
      font-weight: 700;
      border: 1px solid var(--border-soft);
    }
    input[type="file"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: var(--bg-surface);
      font: inherit;
    }
    .summary {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }
    .summary-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 6px;
    }
    .summary-actions[hidden] { display: none; }
    .box {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--bg-surface);
    }
    .box ul {
      margin: 10px 0 0;
      padding-left: 18px;
    }
    .box li {
      color: var(--muted);
      margin: 4px 0;
    }
    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(15, 32, 28, 0.56);
    }
    .overlay[hidden] { display: none; }
    .overlay-card {
      width: min(520px, 100%);
      background: var(--bg-surface);
      border-radius: 18px;
      padding: 22px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }
    .bar {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: var(--bg-surface-soft);
      overflow: hidden;
      margin-top: 12px;
    }
    .bar > span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary), var(--primary2));
      transition: width 140ms linear;
    }
    .overlay-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .overlay-actions[hidden] { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel hero">
      <div>
        <h1 style="margin:0 0 8px;">Importar Excel</h1>
        <p class="meta">La app revisa primero el archivo y solo mete lo que entiende con seguridad.</p>
      </div>
      <div class="toolbar" style="margin-top:0;">
        <button id="import-cancel" type="button" class="secondary">Cancelar</button>
        <button id="import-run" type="button" disabled>IMPORTAR</button>
      </div>
    </section>

    <section class="panel">
      <div class="warn">La importacion segura ya acepta .xlsx y .xls. La app revisa primero el archivo antes de tocar datos.</div>
      <div class="toolbar">
        <input id="import-file" type="file" accept=".xlsx,.xls">
      </div>
      <p id="import-status" class="meta" style="margin-top:12px;">Esperando archivo...</p>
      <div id="import-summary" class="summary"></div>
      <div id="import-summary-actions" class="summary-actions" hidden>
        <button id="import-summary-cancel" type="button" class="secondary">Cancelar</button>
        <button id="import-accept" type="button">Aceptar</button>
      </div>
    </section>
  </div>

  <div id="import-overlay" class="overlay" hidden>
    <div class="overlay-card">
      <h2 id="overlay-title" style="margin:0 0 8px;">Archivo recibido</h2>
      <p id="overlay-text" class="meta">Comprobando archivo...</p>
      <div class="bar"><span id="overlay-bar"></span></div>
      <p id="overlay-count" class="meta" style="margin-top:12px;">0 de 0</p>
      <div id="overlay-actions" class="overlay-actions" hidden>
        <button id="overlay-close" type="button" class="secondary">Cerrar</button>
        <button id="overlay-pick-other" type="button">Elegir otro archivo</button>
      </div>
    </div>
  </div>

  <script src="../../shared/alergenos_oficiales.js"></script>
  <script src="../../backend/persistencia/data_store_local.js"></script>
  <script src="../../backend/operativa/alta_manual.js"></script>
  <script src="../estado/shared_store_browser.js"></script>
  <script src="../../backend/historial/historial_campos.js"></script>
  <script src="../../backend/historial/historial_core.js"></script>
  <script src="../../backend/adaptadores/firestore_productos_remote.js"></script>
  <script src="../config/firebase_config_fase3.js"></script>
  <script type="module" src="../estado/firebase_bootstrap_fase3.js"></script>
  <script src="../../vendor/xlsx.full.min.js"></script>
  <script src="../../backend/excel/importacion_excel.js"></script>
  <script src="../estado/importar_excel_app.js"></script>
</body>
</html>
