    @font-face {
      font-family: "Graphik";

      font-style: normal;
      font-display: swap;

    @font-face {
      font-family: "Graphik";
      src: url("../../assets/fonts/Graphik-Medium.ttf") format("truetype");
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "Graphik";
      src: url("../../assets/fonts/Graphik-Bold.ttf") format("truetype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    :root {
      --font-family-operativa: "Graphik", Arial, sans-serif;
      --panel: var(--bg-surface);
      --text: var(--text-primary);
      --muted: var(--text-secondary);
      --line: var(--border-soft);
      --accent: var(--action-primary);
      --accent2: var(--action-primary-alt);
      --soft: var(--info);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      font-family: var(--font-family-operativa);
      color: var(--text);
      background:
        radial-gradient(circle at 84% -18%, rgba(79, 151, 142, 0.12), rgba(79, 151, 142, 0) 38%),
        linear-gradient(180deg, var(--bg-app), var(--bg-surface-soft));
    }
    .wrap { max-width: 1120px; margin: 0 auto; display: grid; gap: 16px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      box-shadow: var(--shadow-soft);
    }
    h1 { margin: 0 0 8px; font-size: 28px; color: var(--text-brand-large); }
    p { margin: 0; color: var(--muted); }
    label { display: block; margin-top: 12px; font-size: 13px; font-weight: 700; }
    input, textarea {
      width: 100%;
      margin-top: 6px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      font: inherit;
      background: var(--bg-surface);
      color: var(--text);
    }
    textarea { min-height: 170px; resize: vertical; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .primary { color: var(--text-on-dark); background: var(--accent); }
    .secondary {
      color: var(--text-primary);
      background: var(--bg-surface);
      border: 1px solid var(--border-medium);
    }
    .badge {
      display: inline-block;
      margin-right: 8px;
      margin-top: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--support-blue-soft);
      color: var(--info);
      font-weight: 700;
      font-size: 13px;
    }
    pre {
      margin: 0;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--bg-surface-soft);
      padding: 12px;
      min-height: 120px;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
    }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td {
      border-bottom: 1px solid var(--line);
      text-align: left;
      padding: 9px 6px;
      vertical-align: top;
    }
    th { font-size: 12px; color: var(--muted); text-transform: uppercase; }
    .empty { margin: 0; color: var(--muted); }
  </style>
</head>
